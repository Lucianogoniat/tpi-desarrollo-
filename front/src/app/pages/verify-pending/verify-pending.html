<div class="row justify-content-center mt-5">
  <div class="col-md-6 col-lg-5">
    <div class="card shadow-sm">
      <div class="card-body p-4 text-center">
        <div class="mb-4">
          <i class="bi bi-envelope-check display-4" style="color: var(--primary)"></i>
          <h3 class="mt-3 fw-bold">Revisá tu email</h3>
          <p class="text-muted mt-2">
            Te enviamos un link de verificación. Revisá tu bandeja de entrada y seguí el enlace.
          </p>
        </div>

        <button class="btn btn-primary w-100" (click)="resendEmail()" [disabled]="loading()">
          @if (loading()) {
            <span class="spinner-border spinner-border-sm me-1" role="status"></span>
          }
          Reenviar email
        </button>
      </div>
    </div>
  </div>
</div>
