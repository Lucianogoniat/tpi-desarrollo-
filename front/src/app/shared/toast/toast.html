<div class="toast-container position-fixed bottom-0 end-0 p-3">
  <div *ngFor="let toast of toastService.toasts(); trackBy: trackByToast" class="toast show mb-2 align-items-center text-bg-{{ toast.type }} border-0" role="alert">
    <div class="d-flex">
      <div class="toast-body">{{ toast.text }}</div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" aria-label="Close" (click)="close(toast.id)"></button>
    </div>
  </div>
</div>
